<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>VOC 설정</title>
<style>
  :root {
    --surface-2: #ffffff;
    --surface-1: #f6f5f2;
    --surface-0: #f0f0ee;
    --text-primary: #1f1e1c;
    --text-secondary: #5f5e5a;
    --text-muted: #898781;
    --border: #e1e0d9;
    --border-strong: #cfcdc5;
    --bg-accent: #E6F1FB; --text-accent: #0C447C;
    --fill-accent: #2f6fb3; --on-accent: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: var(--text-primary);
  }

  .page { max-width: 1200px; margin: 0 auto; padding: 8px 4px 40px; }
  .page-title { font-size: 24px; font-weight: 800; margin: 0 0 4px; }
  .page-sub { font-size: 13px; color: var(--text-muted); margin: 0 0 20px; }

  .top-tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .top-tab {
    font-size: 13px; font-weight: 700; padding: 9px 18px; border-radius: 8px;
    border: 0.5px solid var(--border-strong); background: var(--surface-2); color: var(--text-secondary); cursor: pointer;
  }
  .top-tab.active { background: var(--fill-accent); color: var(--on-accent); border-color: var(--fill-accent); }

  /* 채널 설정 */
  .section-desc { font-size: 13px; color: var(--text-secondary); margin: 0 0 16px; }
  .channel-list { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 10px; }
  .channel-add-row { display: flex; justify-content: flex-end; margin-bottom: 10px; padding: 0 6px; }
  .btn-primary {
    background: var(--fill-accent); color: var(--on-accent); border: none; border-radius: 8px;
    padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .channel-row {
    display: flex; align-items: center; gap: 16px; padding: 16px 12px; border-top: 0.5px solid var(--border);
  }
  .channel-row:first-child { border-top: none; }
  .channel-icon { width: 40px; height: 40px; border-radius: 8px; background: var(--surface-1); flex-shrink: 0; }
  .channel-info { flex: 1; }
  .channel-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .channel-name { font-size: 14px; font-weight: 700; }
  .always-badge { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px; background: var(--bg-accent); color: var(--text-accent); }
  .use-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; cursor: pointer; user-select: none; }
  .use-toggle input { width: 16px; height: 16px; }
  .use-toggle.disabled { opacity: 0.5; cursor: default; }
  .use-toggle .on { color: var(--fill-accent); }
  .use-toggle .off { color: var(--text-muted); }
  .channel-footer { font-size: 12px; color: var(--text-muted); margin-top: 10px; padding: 0 6px; }

  /* 키워드 설정 */
  .kw-banner {
    background: var(--bg-accent); border-radius: 10px; padding: 12px 16px; margin-bottom: 18px;
  }
  .kw-banner-title { font-size: 13px; font-weight: 700; color: var(--text-accent); margin: 0 0 3px; }
  .kw-banner-desc { font-size: 12px; color: var(--text-accent); margin: 0; line-height: 1.5; }

  .cat-tab-row { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--border-strong); flex-wrap: wrap; }
  .cat-tab {
    font-size: 13px; padding: 9px 14px; color: var(--text-secondary); border-bottom: 2px solid transparent;
    cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px;
  }
  .cat-tab.active { color: var(--text-primary); font-weight: 700; border-bottom-color: var(--text-primary); }
  .cat-tab .count { font-size: 11px; color: var(--text-muted); background: var(--surface-1); border-radius: 999px; padding: 1px 6px; }
  .cat-tab.active .count { color: var(--text-accent); background: var(--bg-accent); }

  .kw-head-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .kw-head-title { font-size: 17px; font-weight: 800; margin: 0 0 4px; }
  .kw-head-sub { font-size: 12px; color: var(--text-muted); margin: 0; }
  .kw-head-actions { display: flex; gap: 8px; }
  .kw-search {
    font-size: 13px; padding: 8px 12px; border-radius: 8px; border: 0.5px solid var(--border-strong);
    width: 220px; background: var(--surface-2);
  }

  .kw-section-label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin: 4px 0 10px; }
  .kw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .kw-card {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 10px;
    border: 0.5px solid var(--border); background: var(--surface-2); cursor: pointer;
  }
  .kw-card.selected { background: var(--bg-accent); border-color: var(--fill-accent); }
  .kw-circle {
    width: 20px; height: 20px; border-radius: 999px; border: 1.5px solid var(--border-strong);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .kw-card.selected .kw-circle { border-color: var(--fill-accent); background: var(--fill-accent); }
  .kw-circle svg { display: none; width: 12px; height: 12px; }
  .kw-card.selected .kw-circle svg { display: block; }
  .kw-card-body { flex: 1; min-width: 0; }
  .kw-card-name { font-size: 14px; font-weight: 700; margin: 0 0 2px; }
  .kw-card-cat { font-size: 11px; color: var(--text-muted); }
  .kw-card-state { font-size: 12px; font-weight: 600; color: var(--text-muted); flex-shrink: 0; }
  .kw-card.selected .kw-card-state { color: var(--fill-accent); }
  .kw-card.hospital-added { border-style: dashed; }

  .add-kw-form {
    display: none; background: var(--surface-1); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px;
  }
  .add-kw-form.open { display: block; }
  .add-kw-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; }
  .add-kw-field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .add-kw-field input { width: 100%; font-size: 12px; padding: 7px 10px; border-radius: 8px; border: 0.5px solid var(--border-strong); }
  @media (max-width: 860px) {
    .kw-grid { grid-template-columns: 1fr; }
    .kw-head-row { flex-direction: column; gap: 10px; }
    .kw-search { width: 100%; }
    .add-kw-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page">
  <p class="page-title">VOC 설정</p>
  <p class="page-sub">VOC 채널과 메디통 표준 카테고리·키워드, 병원 추가 키워드를 관리합니다.</p>

  <div class="top-tab-row">
    <div class="top-tab active" data-ttab="channel" onclick="setTopTab('channel')">채널 설정</div>
    <div class="top-tab" data-ttab="keyword" onclick="setTopTab('keyword')">키워드 설정</div>
  </div>

  <!-- 채널 설정 -->
  <div id="pane-channel">
    <p class="section-desc">사용할 VOC 채널을 선택하세요. 병원에서 사용하는 채널을 직접 추가할 수도 있습니다.</p>
    <div class="channel-add-row"><button class="btn-primary" onclick="toggleAddChannelForm()">+ 채널 추가</button></div>
    <div class="add-kw-form" id="addChannelForm">
      <div class="add-kw-row" style="grid-template-columns:1fr auto">
        <div class="add-kw-field"><label>채널명</label><input type="text" id="newChannelName" placeholder="예: 문자 상담"></div>
        <button class="btn-primary" onclick="addChannel()">저장</button>
      </div>
    </div>
    <div class="channel-list" id="channelList"></div>
    <p class="channel-footer" id="channelFooter"></p>
  </div>

  <!-- 키워드 설정 -->
  <div id="pane-keyword" style="display:none">
    <div class="kw-banner">
      <p class="kw-banner-title">메디통 VOC 표준 분류 · 2026.07.23 (7유형 개편)</p>
      <p class="kw-banner-desc">기본 카테고리 7개와 키워드 362개가 제공됩니다. 기본 키워드는 클릭으로 선택/비선택할 수 있고, 병원은 기존 카테고리에 키워드만 추가할 수 있습니다.</p>
    </div>

    <div class="cat-tab-row" id="catTabRow"></div>

    <div class="kw-head-row">
      <div>
        <p class="kw-head-title" id="kwHeadTitle"></p>
        <p class="kw-head-sub" id="kwHeadSub"></p>
      </div>
      <div class="kw-head-actions">
        <input type="text" class="kw-search" id="kwSearch" placeholder="키워드 검색" oninput="renderKeywordGrid()">
        <button class="btn-primary" onclick="toggleAddForm()">+ 키워드 추가</button>
      </div>
    </div>

    <div class="add-kw-form" id="addKwForm">
      <div class="add-kw-row">
        <div class="add-kw-field"><label>키워드명</label><input type="text" id="newKwName" placeholder="예: 주차 안내"></div>
        <div class="add-kw-field"><label>좋아요 문구</label><input type="text" id="newKwPos" placeholder="예: 주차 안내가 친절했어요"></div>
        <div class="add-kw-field"><label>불편 문구</label><input type="text" id="newKwNeg" placeholder="예: 주차 안내가 부족했어요"></div>
        <button class="btn-primary" onclick="addHospitalKeyword()">저장</button>
      </div>
    </div>

    <p class="kw-section-label">메디통 기본 키워드</p>
    <div class="kw-grid" id="kwGrid"></div>
  </div>

</div>

<script>
/* ---------- 채널 설정 (pix_voc_channels_v1) ---------- */
var CHANNEL_STORAGE_KEY = "pix_voc_channels_v1";
var CHANNELS_EVENT = "pix:voc-channels-updated";
var DEFAULT_CHANNELS = [
  { id: "app", name: "메디통 픽스(앱)", desc: "앱 내 VOC는 자동 등록·자동 분석되어 통계에 반영됩니다.", icon: "Smartphone", on: true, locked: true, custom: false },
  { id: "card", name: "고객의견카드", desc: "종이로 접수된 의견을 담당자가 직접 입력합니다.", icon: "NotebookText", on: true, locked: false, custom: false },
  { id: "phone", name: "직접 전화", desc: "전화로 접수된 내용을 담당자가 직접 입력합니다.", icon: "Phone", on: true, locked: false, custom: false },
  { id: "kakao", name: "카카오톡·채널톡", desc: "메신저 상담 내용을 담당자가 직접 입력합니다.", icon: "MessageCircle", on: false, locked: false, custom: false },
  { id: "web", name: "홈페이지", desc: "홈페이지 게시판 접수 내용을 담당자가 직접 입력합니다.", icon: "Globe", on: false, locked: false, custom: false },
  { id: "visit", name: "현장 상담", desc: "대면 상담 내용을 담당자가 직접 입력합니다.", icon: "Users", on: true, locked: false, custom: false },
  { id: "survey", name: "기타 만족도 조사", desc: "별도 만족도 조사 결과를 담당자가 직접 입력합니다.", icon: "ClipboardList", on: false, locked: false, custom: false },
  { id: "etc", name: "기타", desc: "위 채널에 해당하지 않는 접수 내용을 직접 입력합니다.", icon: "MoreHorizontal", on: false, locked: false, custom: false }
];
var channels = loadChannels();

function loadChannels() {
  try {
    var raw = localStorage.getItem(CHANNEL_STORAGE_KEY);
    if (!raw) return DEFAULT_CHANNELS.slice();
    var parsed = JSON.parse(raw);
    return Array.isArray(parsed) && parsed.length ? parsed : DEFAULT_CHANNELS.slice();
  } catch (e) {
    return DEFAULT_CHANNELS.slice();
  }
}

function saveChannels() {
  try { localStorage.setItem(CHANNEL_STORAGE_KEY, JSON.stringify(channels)); } catch (e) {}
  try {
    window.dispatchEvent(new CustomEvent(CHANNELS_EVENT, { detail: channels }));
    if (window.parent && window.parent !== window) {
      window.parent.dispatchEvent(new CustomEvent(CHANNELS_EVENT, { detail: channels }));
    }
  } catch (e) {}
}

function toggleChannel(i) {
  if (channels[i].locked) return;
  channels[i].on = !channels[i].on;
  saveChannels();
  renderChannels();
}

function renderChannels() {
  document.getElementById("channelList").innerHTML = channels.map(function (c, i) {
    var toggleCls = c.locked ? "use-toggle disabled" : "use-toggle";
    var label = c.on ? '<span class="on">✓ 사용</span>' : '<span class="off">미사용</span>';
    var badge = c.locked ? '<span class="always-badge">항상 사용</span>' : (c.custom ? '<span class="always-badge">병원 추가</span>' : "");
    return '<div class="channel-row">' +
      '<div class="channel-icon"></div>' +
      '<div class="channel-info">' +
      '<div class="channel-name-row"><span class="channel-name">' + c.name + '</span>' + badge + '</div>' +
      '</div>' +
      '<label class="' + toggleCls + '" onclick="toggleChannel(' + i + ')">' +
      '<input type="checkbox" ' + (c.on ? "checked" : "") + (c.locked ? " disabled" : "") + ' onclick="event.preventDefault()">' +
      label +
      '</label>' +
      '</div>';
  }).join("");

  var used = channels.filter(function (c) { return c.on; }).length;
  document.getElementById("channelFooter").textContent = "사용 중 " + used + "개 · 미사용 " + (channels.length - used) + "개";
}

function toggleAddChannelForm() {
  document.getElementById("addChannelForm").classList.toggle("open");
}

function addChannel() {
  var name = document.getElementById("newChannelName").value.trim();
  if (!name) { alert("채널명을 입력해 주세요."); return; }
  channels.push({
    id: "custom_" + Date.now(),
    name: name,
    desc: "병원에서 직접 추가한 채널입니다.",
    icon: "Flag",
    on: true,
    locked: false,
    custom: true
  });
  document.getElementById("newChannelName").value = "";
  document.getElementById("addChannelForm").classList.remove("open");
  saveChannels();
  renderChannels();
}

/* ---------- 상단 탭 ---------- */
function setTopTab(t) {
  document.querySelectorAll(".top-tab").forEach(function (el) { el.classList.toggle("active", el.dataset.ttab === t); });
  document.getElementById("pane-channel").style.display = t === "channel" ? "block" : "none";
  document.getElementById("pane-keyword").style.display = t === "keyword" ? "block" : "none";
}

/* ---------- 키워드 설정 ---------- */
var KW_SELECTED_KEY = "pix_voc_kw_selected_v1";
var KW_HOSPITAL_KEY = "pix_voc_kw_hospital_v1";
var catOrder = Object.keys(VOC_KEYWORD_DATA);
var currentCat = catOrder[0];
var selectedKw = {};
var hospitalKw = {};
catOrder.forEach(function (c) { hospitalKw[c] = []; });
try {
  var selRaw = localStorage.getItem(KW_SELECTED_KEY);
  if (selRaw) selectedKw = JSON.parse(selRaw) || {};
} catch (e) {}
try {
  var hospRaw = localStorage.getItem(KW_HOSPITAL_KEY);
  if (hospRaw) {
    var hospParsed = JSON.parse(hospRaw);
    if (hospParsed && typeof hospParsed === "object") hospitalKw = Object.assign(hospitalKw, hospParsed);
  }
} catch (e) {}

(function migrateCategoryNames() {
  var oldKey = "서비스제공(호텔리티)관련";
  var newKey = "서비스제공";
  if (hospitalKw[oldKey]) {
    hospitalKw[newKey] = (hospitalKw[newKey] || []).concat(hospitalKw[oldKey]);
    delete hospitalKw[oldKey];
  }
  Object.keys(selectedKw).forEach(function (key) {
    if (key.indexOf(oldKey + "||") === 0) {
      selectedKw[newKey + "||" + key.slice(oldKey.length + 2)] = selectedKw[key];
      delete selectedKw[key];
    }
  });
  if (currentCat === oldKey) currentCat = newKey;
})();

function persistKeywordState() {
  try { localStorage.setItem(KW_SELECTED_KEY, JSON.stringify(selectedKw)); } catch (e) {}
  try { localStorage.setItem(KW_HOSPITAL_KEY, JSON.stringify(hospitalKw)); } catch (e) {}
}

function allKeywordsOf(cat) {
  return VOC_KEYWORD_DATA[cat].concat(hospitalKw[cat].map(function (k) { return k.concat([true]); }));
}

function renderCatTabs() {
  document.getElementById("catTabRow").innerHTML = catOrder.map(function (c) {
    var total = VOC_KEYWORD_DATA[c].length + hospitalKw[c].length;
    var isActive = c === currentCat;
    return '<div class="cat-tab' + (isActive ? " active" : "") + '" onclick="setCat(\'' + c + '\')">' + c + ' <span class="count">' + total + '</span></div>';
  }).join("");
}

function setCat(c) {
  currentCat = c;
  document.getElementById("kwSearch").value = "";
  renderCatTabs();
  renderKeywordGrid();
}

function toggleKw(cat, name) {
  var key = cat + "||" + name;
  selectedKw[key] = !selectedKw[key];
  persistKeywordState();
  renderKeywordGrid();
}

function toggleAddForm() {
  document.getElementById("addKwForm").classList.toggle("open");
}

function addHospitalKeyword() {
  var name = document.getElementById("newKwName").value.trim();
  var pos = document.getElementById("newKwPos").value.trim();
  var neg = document.getElementById("newKwNeg").value.trim();
  if (!name || !pos || !neg) { alert("키워드명, 좋아요 문구, 불편 문구를 모두 입력해 주세요."); return; }
  hospitalKw[currentCat].push([name, pos, neg]);
  selectedKw[currentCat + "||" + name] = true;
  document.getElementById("newKwName").value = "";
  document.getElementById("newKwPos").value = "";
  document.getElementById("newKwNeg").value = "";
  document.getElementById("addKwForm").classList.remove("open");
  persistKeywordState();
  renderCatTabs();
  renderKeywordGrid();
}

function renderKeywordGrid() {
  var q = document.getElementById("kwSearch").value.trim().toLowerCase();
  var base = VOC_KEYWORD_DATA[currentCat];
  var added = hospitalKw[currentCat];
  var selectedCount = base.concat(added).filter(function (k) { return selectedKw[currentCat + "||" + k[0]]; }).length;

  document.getElementById("kwHeadTitle").textContent = currentCat;
  document.getElementById("kwHeadSub").textContent =
    "기본 " + base.length + "개 · 선택 " + selectedCount + "개 · 병원 추가 " + added.length + "개";

  function cardHtml(k, isHospital) {
    if (q && k[0].toLowerCase().indexOf(q) === -1) return "";
    var key = currentCat + "||" + k[0];
    var isSel = !!selectedKw[key];
    return '<div class="kw-card' + (isSel ? " selected" : "") + (isHospital ? " hospital-added" : "") + '" onclick="toggleKw(\'' + currentCat + '\',\'' + k[0].replace(/'/g, "\\'") + '\')">' +
      '<span class="kw-circle"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
      '<div class="kw-card-body"><p class="kw-card-name">' + k[0] + '</p><p class="kw-card-cat">' + currentCat + (isHospital ? " · 병원 추가" : "") + '</p></div>' +
      '<span class="kw-card-state">' + (isSel ? "선택됨" : "선택") + '</span>' +
      '</div>';
  }

  var html = base.map(function (k) { return cardHtml(k, false); }).join("");
  if (added.length) {
    html += added.map(function (k) { return cardHtml(k, true); }).join("");
  }
  document.getElementById("kwGrid").innerHTML = html || '<p style="grid-column:1/-1;color:var(--text-muted);font-size:13px;padding:20px 0">검색 결과가 없습니다.</p>';
}

renderChannels();
renderCatTabs();
renderKeywordGrid();
</script>
</body>
</html>
