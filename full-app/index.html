<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareLink Admin</title>
    <script src="js/inline-01.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="text-slate-900">
    <div id="root"></div>

    <script src="pix-ai-summary-modal.js"></script>
    <script src="js/voc-statistics-embed.js"></script>
    
    
    <script src="js/inline-03.js"></script>
    <script src="js/app-bundle.min.js"></script>
  <!-- VOC_MENU_MASTER_SYNC_START -->
    <script src="js/inline-05.js"></script>
    <script src="js/inline-06.js"></script>
<!-- VOC_MENU_MASTER_SYNC_END -->
    <script type="module">
      (async function () {
        if (window.__AGENTATION_CDN_LOADED__) return;
        window.__AGENTATION_CDN_LOADED__ = true;

        try {
          const [{ default: React }, { createRoot }, { Agentation }] = await Promise.all([
            import("https://esm.sh/react@18.3.1"),
            import("https://esm.sh/react-dom@18.3.1/client"),
            import("https://esm.sh/agentation@3.0.2?deps=react@18.3.1,react-dom@18.3.1"),
          ]);
          const mount = document.createElement("div");
          mount.id = "agentation-root";
          document.body.appendChild(mount);
          createRoot(mount).render(React.createElement(Agentation));
        } catch (error) {
          console.warn("Agentation CDN failed to load", error);
        }
      })();
    </script>
  </body>
</html>
